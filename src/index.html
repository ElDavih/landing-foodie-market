<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./global/index.css" />
    <title>FreshMarket - Comidas frescas</title>
  </head>
  <body>
    <header>
      <div class="menu">
        <button aria-label="Abrir menu">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-menu-2"
            aria-hidden="true"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path d="M4 6l16 0" />
            <path d="M4 12l16 0" />
            <path d="M4 18l16 0" />
          </svg>
        </button>
      </div>
      <div class="logo">
        <a href="/">FreshMarket </a>
      </div>
      <div class="search">
        <button aria-label="Buscar">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-search"
            aria-hidden="true"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
            <path d="M21 21l-6 -6" />
          </svg>
        </button>
      </div>
    </header>

    <form action="/" method="get">
      <div class="input-container">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="icon icon-tabler icons-tabler-outline icon-tabler-search"
          aria-hidden="true"
        >
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
          <path d="M21 21l-6 -6" />
        </svg>
        <input
          type="text"
          id="searchmarket"
          placeholder="Search for fresh food, categories, or restaurants..."
        />
      </div>
    </form>

    <main>
      <article class="daily-deal">
        <img
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYItEImJ7lXDB2InpRb-U9uAtJwiJblMlBun0XgpP73PgHhi5VnF_JLnWlKVY-w1M8Bw5RejSRSyhsOQExbHb86kKcIyvAufzaOWGld98ox0IzgGBVLMmE549Sc2gSU4FN5IqaiquMz7RMbtxnhsT5Ecw2louSf50a6InwSPWxIbEQRsplGOcTLPVrOJyb_TETlXzrDF_kW7wpZQMNQLKjCFyhtvsMvZUMDquLf73PXUAj8tZyJe4j"
          alt="Verduras y frutas organicas frescas sobre una mesa"
          class="daily-deal-img"
        />
        <div class="daily-content">
          <span>Daily Deal</span>
          <h1>Fresh Organic Veggie Box</h1>
          <p>Locally sourced, delivered to your door. 30% off today only.</p>
          <button>Claim Offer</button>
        </div>
      </article>
    </main>
  </body>
</html>
